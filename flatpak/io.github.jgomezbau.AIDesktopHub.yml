app-id: io.github.jgomezbau.AIDesktopHub
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: AIDesktopHub
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --filesystem=host
  - --filesystem=xdg-download:rw
  - --talk-name=org.freedesktop.portal.Desktop
  - --env=ELECTRON_TRASH=gio
  - --env=TMPDIR=/var/tmp
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

modules:
  - name: AIDesktopHub
    buildsystem: simple
    build-commands:
      - mkdir -p node_modules/electron/dist
      - cp -r electron-dist/. node_modules/electron/dist/
      - chmod +x node_modules/electron/dist/electron
      - cp -r --no-preserve=mode . /app/share/AIDesktopHub/
      - chmod +x /app/share/AIDesktopHub/node_modules/electron/dist/electron
      - install -d /app/bin
      - install -Dm755 AIDesktopHub.sh /app/bin/AIDesktopHub
      - install -Dm644 flatpak/io.github.jgomezbau.AIDesktopHub.desktop /app/share/applications/io.github.jgomezbau.AIDesktopHub.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.AIDesktopHub.chatgpt.desktop /app/share/applications/io.github.jgomezbau.AIDesktopHub.chatgpt.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.AIDesktopHub.claude.desktop /app/share/applications/io.github.jgomezbau.AIDesktopHub.claude.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.AIDesktopHub.gemini.desktop /app/share/applications/io.github.jgomezbau.AIDesktopHub.gemini.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.AIDesktopHub.grok.desktop /app/share/applications/io.github.jgomezbau.AIDesktopHub.grok.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.AIDesktopHub.deepseek.desktop /app/share/applications/io.github.jgomezbau.AIDesktopHub.deepseek.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.AIDesktopHub.qwen.desktop /app/share/applications/io.github.jgomezbau.AIDesktopHub.qwen.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.AIDesktopHub.metainfo.xml /app/share/metainfo/io.github.jgomezbau.AIDesktopHub.metainfo.xml
      - install -Dm644 assets/icons/aidesktophub.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.AIDesktopHub.png
      - install -Dm644 assets/icons/providers/chatgpt.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.AIDesktopHub.chatgpt.png
      - install -Dm644 assets/icons/providers/claude.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.AIDesktopHub.claude.png
      - install -Dm644 assets/icons/providers/gemini.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.AIDesktopHub.gemini.png
      - install -Dm644 assets/icons/providers/grok.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.AIDesktopHub.grok.png
      - install -Dm644 assets/icons/providers/deepseek.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.AIDesktopHub.deepseek.png
      - install -Dm644 assets/icons/providers/qwen.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.AIDesktopHub.qwen.png

    sources:
      - type: dir
        path: ..

      - type: archive
        url: https://github.com/electron/electron/releases/download/v41.1.0/electron-v41.1.0-linux-x64.zip
        sha256: 4733cfd12e9812e2f780406eac40fcaf98c5d736f40018b3698041e5c58bfefe
        dest: electron-dist
        strip-components: 0
        only-arches:
          - x86_64

      - type: archive
        url: https://github.com/electron/electron/releases/download/v41.1.0/electron-v41.1.0-linux-arm64.zip
        sha256: 3f6190238dd48eda29e6549b202ef308b65cb4429d0a36346258a64e07baad22
        dest: electron-dist
        strip-components: 0
        only-arches:
          - aarch64

      - type: script
        dest-filename: AIDesktopHub.sh
        commands:
          - cd /app/share/AIDesktopHub
          - exec zypak-wrapper /app/share/AIDesktopHub/node_modules/electron/dist/electron --ozone-platform-hint=auto /app/share/AIDesktopHub "$@"
